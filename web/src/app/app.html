<mat-toolbar color="primary">
  <button
    mat-icon-button
    (click)="sidenavOpen.set(!sidenavOpen())"
    aria-label="Toggle navigation menu"
  >
    <mat-icon>menu</mat-icon>
  </button>
  <span>{{ title() }}</span>
  <span class="toolbar-spacer"></span>
  @if (auth.initialized() && auth.isAuthenticated()) {
    <span class="user-email">{{ auth.user()?.email }}</span>
  } @else if (auth.initialized()) {
    <a matButton routerLink="/login">Login</a>
  }
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav [opened]="sidenavOpen()" mode="side" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active-nav-item" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Home</span>
      </a>
      <a mat-list-item routerLink="/clubs" routerLinkActive="active-nav-item">
        <mat-icon matListItemIcon>groups</mat-icon>
        <span matListItemTitle>Clubs</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
