<mat-toolbar class="app-toolbar">
  <button
    mat-icon-button
    (click)="sidenavOpen.set(!sidenavOpen())"
    aria-label="Toggle navigation menu"
  >
    <mat-icon>menu</mat-icon>
  </button>
  <span>{{ title() }}</span>
  <span class="toolbar-spacer"></span>
  @if (auth.initialized()) {
    @if (auth.isAuthenticated()) {
      <button mat-icon-button [matMenuTriggerFor]="accountMenu" aria-label="Open account menu">
        <mat-icon class="account-avatar">account_circle</mat-icon>
      </button>
      <mat-menu #accountMenu="matMenu">
        <button mat-menu-item disabled>{{ auth.user()?.email }}</button>
        <button mat-menu-item routerLink="/profile">
          <mat-icon>manage_accounts</mat-icon>
          <span>Profile</span>
        </button>
        <button mat-menu-item (click)="signOut()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    } @else {
      <button mat-icon-button routerLink="/login" aria-label="Login">
        <mat-icon class="account-avatar">account_circle</mat-icon>
      </button>
    }
  }
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav [opened]="sidenavOpen()" mode="side" class="sidenav">
    <div class="sidenav-inner">
    <mat-nav-list class="sidenav-nav-list">
      <a mat-list-item routerLink="/" routerLinkActive="active-nav-item" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Home</span>
      </a>
      <a mat-list-item routerLink="/clubs" routerLinkActive="active-nav-item">
        <mat-icon matListItemIcon>groups</mat-icon>
        <span matListItemTitle>Clubs</span>
      </a>
    </mat-nav-list>
    <mat-button-toggle-group
      class="theme-toggle"
      [value]="themePreference()"
      (valueChange)="setThemePreference($event)"
      aria-label="Theme preference"
      hideSingleSelectionIndicator
    >
      <mat-button-toggle value="light" aria-label="Use light theme">
        <mat-icon>light_mode</mat-icon>
      </mat-button-toggle>
      <mat-button-toggle value="system" aria-label="Use system default theme">
        <mat-icon>settings_brightness</mat-icon>
        <span>System default</span>
      </mat-button-toggle>
      <mat-button-toggle value="dark" aria-label="Use dark theme">
        <mat-icon>dark_mode</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
