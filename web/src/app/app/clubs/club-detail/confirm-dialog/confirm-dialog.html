<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton type="button" (click)="cancel()">Cancel</button>
  <button matButton="filled" type="button" (click)="confirm()">{{ data.confirmLabel }}</button>
</mat-dialog-actions>
